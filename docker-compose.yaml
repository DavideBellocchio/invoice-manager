services:

  postgres:
    container_name: postgres
    image: postgres:16
    restart: unless-stopped
    environment:
        POSTGRES_DB: ${DB_NAME}
        POSTGRES_USER: ${DB_USERNAME}
        POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
        - "${DB_PORT}:5432"
    volumes:
        - "postgres_data:/var/lib/postgresql/data"

